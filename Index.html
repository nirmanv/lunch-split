<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunch Split Calculator</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f5f7;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-top:5px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    background:#007AFF;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    text-align:center;
}

th{
    background:#007AFF;
    color:white;
}

.result{
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🍔 Lunch Split Calculator</h1>

<div class="card">

<label>Tax ($)</label>
<input id="tax" type="number" step="0.01" value="0">

<label>Tip ($)</label>
<input id="tip" type="number" step="0.01" value="0">

<button onclick="addPerson()">+ Add Person</button>

</div>

<div class="card">

<table id="peopleTable">

<thead>
<tr>
<th>Name</th>
<th>Food</th>
<th>Total Owed</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

<br>

<button onclick="calculate()">Calculate</button>

</div>

<div class="card">

<h2>Summary</h2>

<p>Total Food:
<span id="foodTotal">$0.00</span></p>

<p>Total Bill:
<span id="billTotal">$0.00</span></p>

</div>

</div>

<script>

const tbody=document.querySelector("#peopleTable tbody");

function addPerson(){

let row=document.createElement("tr");

row.innerHTML=`
<td><input placeholder="Name"></td>
<td><input type="number" step="0.01" value="0"></td>
<td class="result">$0.00</td>
`;

tbody.appendChild(row);

}

addPerson();

function calculate(){

const rows=[...tbody.rows];

let tax=parseFloat(document.getElementById("tax").value)||0;
let tip=parseFloat(document.getElementById("tip").value)||0;

let foodTotal=0;

rows.forEach(r=>{
foodTotal+=parseFloat(r.cells[1].querySelector("input").value)||0;
});

let totalBill=foodTotal+tax+tip;

rows.forEach(r=>{

let food=parseFloat(r.cells[1].querySelector("input").value)||0;

let ratio=foodTotal===0?0:food/foodTotal;

let total=food+(ratio*tax)+(ratio*tip);

r.cells[2].innerHTML="$"+total.toFixed(2);

});

document.getElementById("foodTotal").innerHTML="$"+foodTotal.toFixed(2);
document.getElementById("billTotal").innerHTML="$"+totalBill.toFixed(2);

}

</script>

</body>
</html>
